{% extends 'index.html' %}
{% block body %}
<form id="form1" name="form1" method="post" action="view_feedbacksrch#about">
  <table width="247" border="1" class="table table-striped">
    <tr>
      <th colspan="3" scope="col"><label>Date
          <input type="Date" name="textfield" required/>
          <input type="submit" name="Submit" value="Search" class="btn btn-info" />
      </label></th>
    </tr>
    <tr class="table table-dark">
      <td width="44">User</td>
      <td width="66">Feedback</td>
      <td width="115">Date</td>
    </tr>
      {% for i in val %}
    <tr>
      <td> {{ i.User.Name }}</td>
      <td>&nbsp;{{ i.Feedback }}</td>
      <td>&nbsp;{{ i.Date }}</td>
    </tr>
      {% endfor %}
  </table>
</form>
{% endblock %}
