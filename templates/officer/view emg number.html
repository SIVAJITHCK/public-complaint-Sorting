{% extends 'indexofficer.html' %}
{% block body %}
<form id="form1" name="form1" method="post" action="">
  <table width="200" border="1" class="table table-striped">
    <tr>
      <th scope="col">Number</th>
      <th scope="col">Department</th>
    </tr>
     {% for i in val %}
    <tr>
      <td>{{ i.No}}</td>
      <td>{{ i.Officer.DEPARTMENT.Name}}</td>
    <td/>
          <a href="/delete_emg_number/{{ i.id }}#about" class="btn btn-danger">Delete</a></td>
    </tr>
      {% endfor %}
   <tr>
      <td colspan="6"><label>

        <div align="center"><a href="/add_emg#about" class="btn btn-primary">ADD NEW</a></div>
      </label></td>
    </tr>
  </table>
</form>
{% endblock %}
