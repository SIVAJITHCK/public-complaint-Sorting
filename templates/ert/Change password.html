{% extends 'ertindex.html' %}
{% block body %}
<form action="/changepassword_postert" method="post" enctype="multipart/form-data" name="form1" id="form1">
  <table width="341" border="1" class="table table-striped">
    <tr>
      <th width="114" scope="row"><div align="left">Old password </div></th>
      <td width="144"><label>
      <input type="password" name="textfield" />
      </label></td>
    </tr>
    <tr>
      <th scope="row"><div align="left">New Password </div></th>
      <td><label>
      <input type="password" name="textfield2" />
