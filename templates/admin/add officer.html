{% extends 'index.html' %}
{% block body %}
<form id="form1" name="form1" method="post" action="addof">
  <table width="200" border="1" class="table table-striped">
    <tr>
      <th scope="row"><div align="center">NAME</div></th>
      <td><div align="center">
        <label>
        <input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}" />
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Place</div></th>
      <td><div align="center">
        <label>
        <textarea name="textarea" required pattern="[A-Z a-z.]{3,25}"></textarea>
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Post</div></th>
      <td><div align="center">
        <label>
        <input type="text" name="textfield2" required pattern="[A-Z a-z.]{3,25}"/>
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Pin</div></th>
      <td><div align="center">
        <label>
        <input type="text" name="textfield3" required pattern="[0-9]{6}"/>
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Phone</div></th>
      <td><div align="center">
        <label>
        <input type="text" name="textfield4" required pattern="[6789][0-9]{9}" />
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Email</div></th>
      <td><div align="center">
        <label>
        <input type="text" name="textfield5" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}" />
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Department</div></th>
      <td><div align="center">
        <label>
        <select name="select">
            {% for i in val %}
            <option value="{{ i.id }}">{{ i.Name }}</option>
            {% endfor %}
        </select>

        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Username</div></th>
      <td><div align="center">
        <label>
        <input type="text" name="textfield6" required pattern="[A-Z a-z.]{3,25}" />
        </label>
      </div></td>
    </tr>
    <tr>
      <th scope="row"><div align="center">Password</div></th>
      <td><div align="center">
        <label>
        <input type="password" name="textfield7" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"/>
        </label>
      </div></td>
    </tr>
    <tr>
      <th colspan="2" scope="row"><label>
        <input type="submit" name="Submit" value="ADD" class="btn btn-primary" />
      </label></th>
    </tr>
  </table>
</form>
{% endblock %}
